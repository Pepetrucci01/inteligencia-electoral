<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estructura — SIE Colima 2027</title>
<link rel="stylesheet" href="sie_styles.css">
<script src="sie_data.js"></script>
<script src="sie_nav.js"></script>
</head>
<body>
<div id="topbar"></div>
<div id="nav"></div>
<div id="main">
  <div id="role-banner"></div>
  <div class="card">
    <h3>🏗 Estructura Territorial por Municipio</h3>
    <table>
      <thead><tr><th>Municipio</th><th>Secciones</th><th>Meta 2027</th><th>Capturistas Est.</th><th>Fácil</th><th>Medio</th><th>Difícil</th></tr></thead>
      <tbody id="est-table"></tbody>
    </table>
  </div>
  <div class="card">
    <h3>🏗 Estructura por Distrito Local</h3>
    <table>
      <thead><tr><th>Distrito</th><th>Secciones</th><th>Meta 2027</th><th>Fácil</th><th>Medio</th><th>Difícil</th></tr></thead>
      <tbody id="dl-est-table"></tbody>
    </table>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded',function(){
  buildNav('estructura');
  const mt=document.getElementById('est-table');
  MUNICIPIOS.forEach(m=>{
    mt.innerHTML+=`<tr>
      <td style="font-weight:600">${m.nombre}</td>
      <td>${m.secciones}</td>
      <td style="color:var(--accent);font-weight:600">${SIE.fmt(m.meta)}</td>
      <td>—</td>
      <td><span class="badge facil">${m.facil}</span></td>
      <td><span class="badge medio">${m.medio}</span></td>
      <td><span class="badge dificil">${m.dificil}</span></td>
    </tr>`;
  });
  const dt=document.getElementById('dl-est-table');
  DISTRITOS_L.forEach(d=>{
    dt.innerHTML+=`<tr>
      <td style="font-weight:600">${d.nombre}</td>
      <td>${d.secciones}</td>
      <td style="color:var(--accent);font-weight:600">${SIE.fmt(d.meta)}</td>
      <td><span class="badge facil">${d.facil}</span></td>
      <td><span class="badge medio">${d.medio}</span></td>
      <td><span class="badge dificil">${d.dificil}</span></td>
    </tr>`;
  });
});
</script>
</body>
</html>
