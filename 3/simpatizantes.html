<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simpatizantes — SIE Colima 2027</title>
<link rel="stylesheet" href="sie_styles.css">
<script src="sie_data.js"></script>
<script src="sie_nav.js"></script>
<style>
.sim-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.sim-name{font-weight:500;font-size:13px;}
.sim-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.comp-badge{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;}
.comp-1{background:rgba(139,148,158,0.2);color:var(--text2);}
.comp-2{background:rgba(78,205,196,0.2);color:var(--blue);}
.comp-3{background:rgba(0,204,102,0.2);color:var(--green);}
.comp-4{background:rgba(233,69,96,0.2);color:var(--accent);}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filters select,.filters input{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;outline:none;}
.btn-new{background:var(--green);color:#000;border:none;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div id="topbar"></div>
<div id="nav"></div>
<div id="main">
  <div id="role-banner"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div class="filters">
      <select id="fil-mun" onchange="filtrar()">
        <option value="">Todos los municipios</option>
        <option value="ARMERIA">ARMERIA</option>
<option value="COLIMA">COLIMA</option>
<option value="COMALA">COMALA</option>
<option value="COQUIMATLAN">COQUIMATLAN</option>
<option value="CUAUHTEMOC">CUAUHTEMOC</option>
<option value="IXTLAHUACAN">IXTLAHUACAN</option>
<option value="MANZANILLO">MANZANILLO</option>
<option value="MINATITLAN">MINATITLAN</option>
<option value="TECOMAN">TECOMAN</option>
<option value="VILLA DE ALVAREZ">VILLA DE ALVAREZ</option>
      </select>
      <select id="fil-comp" onchange="filtrar()">
        <option value="">Todos los compromisos</option>
        <option value="1">1 — Contacto</option>
        <option value="2">2 — Simpatiza</option>
        <option value="3">3 — Seguro vota</option>
        <option value="4">4 — Moviliza</option>
      </select>
      <input type="text" id="fil-buscar" placeholder="🔍 Buscar nombre..." onkeyup="filtrar()">
    </div>
    <button class="btn-new" onclick="window.location.href='captura.html'">➕ Nuevo registro</button>
  </div>

  <div class="card">
    <h3>👥 Simpatizantes Capturados <span id="count-lbl" style="font-size:11px;color:var(--text2);font-weight:400;">— 0 registros</span></h3>
    <div id="sim-list">
      <div style="text-align:center;padding:50px;color:var(--text2);">
        <div style="font-size:40px;margin-bottom:10px;">👥</div>
        <p>Aún no hay simpatizantes capturados.</p>
        <p style="font-size:11px;margin-top:6px;">Usa el módulo de <a href="captura.html" style="color:var(--accent)">Captura</a> para registrar.</p>
      </div>
    </div>
  </div>
</div>
<script>
const DEMO_DATA = [
  {nombre:'María García López',ap:'García',am:'López',edad:34,sexo:'MUJER',sec:138,mun:'VILLA DE ALVAREZ',tel:'312-111-0001',comp:3,origen:'Casa por casa',riesgo:false,apoyo:false,influencia:true},
  {nombre:'José Martínez Ruiz',ap:'Martínez',am:'Ruiz',edad:52,sexo:'HOMBRE',sec:138,mun:'VILLA DE ALVAREZ',tel:'312-111-0002',comp:4,origen:'Referido',riesgo:false,apoyo:true,influencia:true},
  {nombre:'Ana Torres Mendoza',ap:'Torres',am:'Mendoza',edad:28,sexo:'MUJER',sec:139,mun:'VILLA DE ALVAREZ',tel:'312-111-0003',comp:2,origen:'Digital',riesgo:false,apoyo:false,influencia:false},
  {nombre:'Carlos Pérez Silva',ap:'Pérez',am:'Silva',edad:45,sexo:'HOMBRE',sec:138,mun:'VILLA DE ALVAREZ',tel:'312-111-0004',comp:3,origen:'Evento',riesgo:true,apoyo:false,influencia:false},
  {nombre:'Laura Hernández Cruz',ap:'Hernández',am:'Cruz',edad:31,sexo:'MUJER',sec:140,mun:'VILLA DE ALVAREZ',tel:'312-111-0005',comp:1,origen:'Casa por casa',riesgo:false,apoyo:true,influencia:false},
];

const compLabels={1:'Contacto',2:'Simpatiza',3:'Seguro vota',4:'Moviliza'};
let datos = [...DEMO_DATA];

document.addEventListener('DOMContentLoaded',function(){
  buildNav('simpatizantes');
  renderList(datos);
});

function filtrar(){
  const mun=document.getElementById('fil-mun').value;
  const comp=document.getElementById('fil-comp').value;
  const buscar=document.getElementById('fil-buscar').value.toLowerCase();
  let result=DEMO_DATA.filter(s=>{
    if(mun && s.mun!==mun) return false;
    if(comp && s.comp!=comp) return false;
    if(buscar && !s.nombre.toLowerCase().includes(buscar)) return false;
    return true;
  });
  renderList(result);
}

function renderList(data){
  document.getElementById('count-lbl').textContent='— '+data.length+' registros';
  const el=document.getElementById('sim-list');
  if(!data.length){
    el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text2);">No se encontraron registros</div>';
    return;
  }
  el.innerHTML=data.map(s=>`
  <div class="sim-item">
    <div>
      <div class="sim-name">${s.nombre}</div>
      <div class="sim-sub">Sección ${s.sec} · ${s.mun} · ${s.edad} años · ${s.sexo} · ${s.origen}</div>
      <div class="sim-sub" style="margin-top:2px;">
        ${s.riesgo?'⚠️ Riesgo alto ':''} ${s.apoyo?'🚗 Necesita transporte ':''} ${s.influencia?'👥 Tiene influencia':''}
      </div>
    </div>
    <span class="comp-badge comp-${s.comp}">${s.comp} — ${compLabels[s.comp]}</span>
  </div>`).join('');
}
</script>
</body>
</html>
